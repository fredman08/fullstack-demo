<div class="container">
  <div class="header">
    <div>
      <h1>Customers</h1>
      <p>Data from <strong>PostgreSQL</strong> via <span class="tag tag-rest">REST GET /api/customers</span></p>
    </div>
    <a routerLink="/customers/new" class="btn-primary" data-testid="new-customer-btn">+ New Customer</a>
  </div>

  <div *ngIf="loading" class="error" style="background:#f0f9ff;border-color:#bae6fd;color:#0369a1">
    Loading…
  </div>

  <div *ngIf="error" class="error" data-testid="list-error">
    {{ error }} — is the backend reachable?
  </div>

  <table *ngIf="!loading && customers.length > 0">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of customers" data-testid="customer-row">
        <td>
          <a
            [routerLink]="['/customers', c.id]"
            data-testid="customer-name-link"
          >{{ c.name }}</a>
        </td>
        <td data-testid="customer-email-cell">{{ c.email }}</td>
        <td>{{ c.created_at | date:'medium' }}</td>
        <td>
          <button (click)="delete(c.id)" class="btn-danger" data-testid="delete-btn">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && customers.length === 0" data-testid="empty-state">
    No customers yet. Create one!
  </p>
</div>
