<div class="container">
  <div class="header">
    <div>
      <h1>Customers</h1>
      <p>Data from <strong>PostgreSQL</strong> via <span class="tag tag-rest">REST GET /api/customers</span></p>
    </div>
    <a routerLink="/customers/new" class="btn-primary">+ New Customer</a>
  </div>

  <div *ngIf="loading" class="error" style="background:#f0f9ff;border-color:#bae6fd;color:#0369a1">
    Loading…
  </div>

  <div *ngIf="error" class="error">{{ error }} — is the backend running on port 4000?</div>

  <table *ngIf="!loading && customers.length > 0">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of customers">
        <td><a [routerLink]="['/customers', c.id]">{{ c.name }}</a></td>
        <td>{{ c.email }}</td>
        <td>{{ c.created_at | date:'medium' }}</td>
        <td>
          <button (click)="delete(c.id)" class="btn-danger">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && customers.length === 0">No customers yet. Create one!</p>
</div>
